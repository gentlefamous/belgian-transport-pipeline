<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Belgian transport pipeline architecture</title>
<desc>End-to-end data pipeline from iRail API through Kafka, ADLS, PySpark, dbt, to Streamlit dashboard</desc>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .leader { stroke: #ccc; stroke-width: 0.5; stroke-dasharray: 3 3; }

  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green .th { fill: #27500A; }
  .c-green .ts { fill: #3B6D11; }

  .c-pink rect { fill: #FBEAF0; stroke: #993556; }
  .c-pink .th { fill: #72243E; }

  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="720" fill="white" rx="0"/>

<text class="ts" x="340" y="20" text-anchor="middle" fill="#666">Data source</text>

<g class="c-blue">
<rect x="220" y="30" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">iRail API</text>
<text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">Live SNCB/NMBS train departures</text>
</g>

<line x1="340" y1="86" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="120" y="120" width="440" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Apache Kafka (KRaft mode)</text>
<text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Topics: departures | dead-letter-queue</text>
</g>

<line x1="340" y1="176" x2="340" y2="210" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="140" y="210" width="400" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">Azure Data Lake Storage Gen2</text>
<text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central">raw/ container → processed/ container</text>
</g>

<line x1="340" y1="266" x2="340" y2="300" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="170" y="300" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="320" text-anchor="middle" dominant-baseline="central">PySpark</text>
<text class="ts" x="340" y="338" text-anchor="middle" dominant-baseline="central">Clean, deduplicate, derive columns</text>
</g>

<line x1="340" y1="356" x2="340" y2="390" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
<rect x="120" y="390" width="440" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="410" text-anchor="middle" dominant-baseline="central">dbt Core (DuckDB)</text>
<text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central">stg_departures → fct_delays → dim_stations</text>
<text class="ts" x="340" y="446" text-anchor="middle" dominant-baseline="central">dim_time → mart_delay_summary | 16 tests</text>
</g>

<line x1="340" y1="466" x2="340" y2="500" class="arr" marker-end="url(#arrow)"/>

<g class="c-green">
<rect x="170" y="500" width="340" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="520" text-anchor="middle" dominant-baseline="central">Streamlit dashboard</text>
<text class="ts" x="340" y="538" text-anchor="middle" dominant-baseline="central">Delay heatmaps, KPIs, trend analysis</text>
</g>

<g class="c-pink">
<rect x="20" y="130" width="70" height="410" rx="8" stroke-width="0.5"/>
<text class="th" x="55" y="335" text-anchor="middle" dominant-baseline="central" transform="rotate(-90 55 335)">Airflow orchestration</text>
</g>

<g class="c-gray">
<rect x="590" y="130" width="70" height="260" rx="8" stroke-width="0.5"/>
<text class="th" x="625" y="260" text-anchor="middle" dominant-baseline="central" transform="rotate(90 625 260)">Terraform (Azure IaC)</text>
</g>

<g class="c-gray">
<rect x="590" y="410" width="70" height="130" rx="8" stroke-width="0.5"/>
<text class="th" x="625" y="475" text-anchor="middle" dominant-baseline="central" transform="rotate(90 625 475)">GitHub Actions CI/CD</text>
</g>

<g class="c-gray">
<rect x="130" y="590" width="140" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="200" y="608" text-anchor="middle" dominant-baseline="central">Azure Key Vault</text>
</g>
<g class="c-gray">
<rect x="310" y="590" width="160" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="390" y="608" text-anchor="middle" dominant-baseline="central">30 automated tests</text>
</g>
<g class="c-gray">
<rect x="510" y="590" width="100" height="36" rx="6" stroke-width="0.5"/>
<text class="ts" x="560" y="608" text-anchor="middle" dominant-baseline="central">Docker</text>
</g>

<line class="leader" x1="90" y1="210" x2="140" y2="238"/>
<line class="leader" x1="90" y1="330" x2="170" y2="328"/>
<line class="leader" x1="90" y1="430" x2="120" y2="428"/>
<line class="leader" x1="590" y1="210" x2="540" y2="238"/>
<line class="leader" x1="590" y1="328" x2="510" y2="328"/>

<text class="ts" x="340" y="660" text-anchor="middle" fill="#666">Built with: Python · Kafka · PySpark · dbt · Airflow · Terraform · Docker · GitHub Actions</text>
<text class="ts" x="340" y="680" text-anchor="middle" fill="#666">Data: real-time SNCB/NMBS Belgian railway departures from 5 major stations</text>

</svg>